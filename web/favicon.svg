<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32" role="img" aria-label="Fluffless">
  <defs>
    <!-- Editorial Dusk surface gradient -->
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#14110e"/>
      <stop offset="0.5" stop-color="#0f0d0b"/>
      <stop offset="1" stop-color="#0c0a08"/>
    </linearGradient>
    <!-- Soft amber glow behind the highlighted segment -->
    <radialGradient id="glow" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#d4a574" stop-opacity="0.45"/>
      <stop offset="0.6" stop-color="#d4a574" stop-opacity="0.10"/>
      <stop offset="1" stop-color="#d4a574" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Dark tile, sharp 2px corners per the design language -->
  <rect x="0" y="0" width="32" height="32" rx="3" fill="url(#bg)"/>
  <rect x="0.5" y="0.5" width="31" height="31" rx="2.5" fill="none"
        stroke="#d4a574" stroke-opacity="0.18"/>

  <!-- Ambient glow over the centre -->
  <circle cx="16" cy="16" r="13" fill="url(#glow)"/>

  <!-- A waveform: a fixed-rate fingerprint stream. The contiguous centre block
       is the detected recurring segment ("the fluff") — bright amber, the one
       thing highlighted; the surrounding content stays dim. Five wide bars stay
       legible down to 16px. -->
  <g>
    <!-- outer / unrelated content (dim) -->
    <rect x="4.5"  y="11.5" width="3" height="9"  rx="1.5" fill="#a8a29e"/>
    <!-- the recurring segment (bright amber) -->
    <rect x="9.5"  y="7.5"  width="3" height="17" rx="1.5" fill="#fcd34d"/>
    <rect x="14.5" y="3.5"  width="3" height="25" rx="1.5" fill="#fcd34d"/>
    <rect x="19.5" y="7.5"  width="3" height="17" rx="1.5" fill="#fcd34d"/>
    <!-- outer / unrelated content (dim) -->
    <rect x="24.5" y="11.5" width="3" height="9"  rx="1.5" fill="#9fb3a0"/>
  </g>
</svg>
